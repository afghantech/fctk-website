name: Deploy Next.js

on:
  push:
    branches: [main, feature]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  LOCAL_IMAGE: fctk-website

jobs:
  test:
    name: Unit Tests (Jest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  docker:
    name: Docker build and push
    runs-on: ubuntu-latest
    needs: [test]
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (load to Docker)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ env.LOCAL_IMAGE }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_SITE_URL=${{ vars.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_YANDEX_METRIKA_ID=${{ secrets.NEXT_PUBLIC_YANDEX_METRIKA_ID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate Cloud.ru registry secrets
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          CLOUDRU_REGISTRY: ${{ secrets.CLOUDRU_REGISTRY }}
          CLOUDRU_REPOSITORY: ${{ secrets.CLOUDRU_REPOSITORY }}
          CLOUDRU_KEY_ID: ${{ secrets.CLOUDRU_KEY_ID }}
          CLOUDRU_KEY_SECRET: ${{ secrets.CLOUDRU_KEY_SECRET }}
        run: |
          set -eux
          missing=0
          for name in CLOUDRU_REGISTRY CLOUDRU_REPOSITORY CLOUDRU_KEY_ID CLOUDRU_KEY_SECRET; do
            eval "val=\${$name:-}"
            if [ -z "$val" ]; then
              echo "Missing GitHub secret: $name"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Set CLOUDRU_REGISTRY (e.g. my-nextjs-registry.cr.cloud.ru) and CLOUDRU_REPOSITORY (repository / image name without registry)."
            exit 1
          fi

      - name: Log in to Cloud.ru Artifact Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.CLOUDRU_REGISTRY }}
          username: ${{ secrets.CLOUDRU_KEY_ID }}
          password: ${{ secrets.CLOUDRU_KEY_SECRET }}

      - name: Tag and push to Artifact Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          CLOUDRU_REGISTRY: ${{ secrets.CLOUDRU_REGISTRY }}
          CLOUDRU_REPOSITORY: ${{ secrets.CLOUDRU_REPOSITORY }}
        run: |
          set -eux
          REMOTE_IMAGE="${CLOUDRU_REGISTRY}/${CLOUDRU_REPOSITORY}"
          docker tag "${LOCAL_IMAGE}:${GITHUB_SHA}" "${REMOTE_IMAGE}:${GITHUB_SHA}"
          docker tag "${LOCAL_IMAGE}:${GITHUB_SHA}" "${REMOTE_IMAGE}:latest"
          docker push "${REMOTE_IMAGE}:${GITHUB_SHA}"
          docker push "${REMOTE_IMAGE}:latest"
